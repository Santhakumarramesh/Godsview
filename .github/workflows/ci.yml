name: GodsView CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: TypeCheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck API Server
        run: pnpm --filter @workspace/api-server typecheck

      - name: TypeCheck Dashboard
        run: cd artifacts/godsview-dashboard && npx tsc --noEmit

      - name: Run Unit Tests
        run: cd artifacts/api-server && npx vitest run --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: typecheck-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API Server
        run: cd artifacts/api-server && pnpm run build

      - name: Build Dashboard
        run: cd artifacts/godsview-dashboard && pnpm run build

      - name: Upload Dashboard Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: artifacts/godsview-dashboard/dist/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f artifacts/api-server/Dockerfile -t godsview-api:${{ github.sha }} .

      - name: Build Dashboard Docker image
        run: docker build -f artifacts/godsview-dashboard/Dockerfile -t godsview-dashboard:${{ github.sha }} .
