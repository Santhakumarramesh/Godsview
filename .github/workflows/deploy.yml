name: GodsView Deploy

on:
  push:
    branches:
      - main
      - production-ready-v3
      - production-ready-v4
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (dev/prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      skip_approval:
        description: "Skip manual approval for dev only"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GV_REGION: us-east-1

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Determine environment based on branch/input
  # ────────────────────────────────────────────────────────────────────────
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      requires-approval: ${{ steps.set-env.outputs.requires-approval }}
    steps:
      - name: Determine target environment
        id: set-env
        run: |
          # Manual dispatch takes priority
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          else
            # Branch-based defaults
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              ENV="dev"
            elif [[ "${{ github.ref }}" == "refs/heads/production-ready"* ]]; then
              ENV="prod"
            else
              ENV="dev"
            fi
          fi

          # Prod always requires approval
          if [[ "$ENV" == "prod" ]]; then
            APPROVAL="true"
          else
            APPROVAL="false"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "requires-approval=$APPROVAL" >> $GITHUB_OUTPUT
          echo "Deployment environment: $ENV (approval required: $APPROVAL)"

  # ────────────────────────────────────────────────────────────────────────
  # Validation: Lint, test, build
  # ────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint || true
        continue-on-error: true

      - name: Type check
        run: pnpm run typecheck || true
        continue-on-error: true

      - name: Run tests
        run: pnpm run test 2>&1 | head -100 || true
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Build: Docker images and artifacts
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images and Artifacts
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      matrix:
        dockerfile:
          - path: ./Dockerfile
            tag: api
          - path: ./services/Dockerfile
            tag: services
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if Dockerfile exists
        id: check-dockerfile
        run: |
          if [[ -f "${{ matrix.dockerfile.path }}" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image - ${{ matrix.dockerfile.tag }}
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile.path }}
          push: false
          tags: godsview-${{ matrix.dockerfile.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard artifacts
        if: matrix.dockerfile.tag == 'api'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @workspace/dashboard build
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Pre-deployment validation
  # ────────────────────────────────────────────────────────────────────────
  pre-deploy-validation:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    needs: [build, determine-environment]
    environment:
      name: "pre-deploy-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Run pre-deployment checks
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          bash scripts/validate-deploy.sh
        continue-on-error: true

      - name: Verify CDK synthesizes
        run: |
          cd infra
          pnpm install --frozen-lockfile
          npx cdk synth
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Manual approval gate (prod only)
  # ────────────────────────────────────────────────────────────────────────
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, determine-environment]
    if: needs.determine-environment.outputs.requires-approval == 'true'
    environment:
      name: "approve-deploy-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - name: Approved for production deployment
        run: |
          echo "✓ Production deployment approved by reviewer"
          echo "Proceeding with infrastructure and application deployment"

  # ────────────────────────────────────────────────────────────────────────
  # Infrastructure deployment (CDK)
  # ────────────────────────────────────────────────────────────────────────
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, determine-environment]
    if: |
      always() &&
      needs.pre-deploy-validation.result == 'success' &&
      (needs.determine-environment.outputs.requires-approval == 'false' ||
       needs.approval.result == 'success')
    environment:
      name: "deploy-infra-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: |
          cd infra
          pnpm install --frozen-lockfile

      - name: Deploy infrastructure stacks
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          cd infra

          # Show what will be deployed
          echo "=== CDK Diff ==="
          npx cdk diff --context env=$GV_ENV 2>&1 | head -50 || true

          # Deploy stacks
          echo ""
          echo "=== Deploying Stacks ==="
          npx cdk deploy --all \
            --context env=$GV_ENV \
            --require-approval never \
            --method direct \
            --concurrency 4
        timeout-minutes: 45

      - name: Output stack information
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        if: success()
        run: |
          STACK_PREFIX="godsview-$GV_ENV"

          echo "=== Deployed CloudFormation Stacks ==="
          aws cloudformation describe-stacks \
            --region $AWS_REGION \
            --query "Stacks[?starts_with(StackName, '$STACK_PREFIX')].{Name:StackName, Status:StackStatus}" \
            --output table

          echo ""
          echo "=== Stack Outputs ==="
          for stack in network storage data compute; do
            echo ""
            echo "Stack: $STACK_PREFIX-$stack"
            aws cloudformation describe-stacks \
              --stack-name "$STACK_PREFIX-$stack" \
              --region $AWS_REGION \
              --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
              --output table || true
          done

  # ────────────────────────────────────────────────────────────────────────
  # Application deployment (API)
  # ────────────────────────────────────────────────────────────────────────
  deploy-application:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, determine-environment]
    if: needs.deploy-infrastructure.result == 'success'
    environment:
      name: "deploy-app-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push Docker image to ECR
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          STACK_PREFIX="godsview-$GV_ENV"

          # Get ECR repo URI
          ECR_REPO=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_PREFIX-storage" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiRepoUri'].OutputValue" \
            --output text)

          if [[ -z "$ECR_REPO" || "$ECR_REPO" == "None" ]]; then
            echo "ERROR: Could not find ECR repository"
            exit 1
          fi

          echo "ECR Repository: $ECR_REPO"

          # Authenticate Docker
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REPO

          # Build image
          docker build \
            -t $ECR_REPO:latest \
            -t $ECR_REPO:${{ github.sha }} \
            -t $ECR_REPO:$GV_ENV \
            --build-arg ENVIRONMENT=$GV_ENV \
            .

          # Push images
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:$GV_ENV

          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV
        timeout-minutes: 30

      - name: Trigger ECS service deployment
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          CLUSTER="godsview-$GV_ENV"
          SERVICE="ApiService"

          echo "Triggering ECS service redeploy..."
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

          echo "Waiting for deployment to stabilize (max 10 minutes)..."
          for i in {1..60}; do
            STATUS=$(aws ecs describe-services \
              --cluster $CLUSTER \
              --services $SERVICE \
              --region $AWS_REGION \
              --query 'services[0].{DesiredCount:desiredCount, RunningCount:runningCount, PendingCount:pendingCount}' \
              --output json)

            DESIRED=$(echo "$STATUS" | jq -r '.DesiredCount')
            RUNNING=$(echo "$STATUS" | jq -r '.RunningCount')
            PENDING=$(echo "$STATUS" | jq -r '.PendingCount')

            echo "Status: Desired=$DESIRED, Running=$RUNNING, Pending=$PENDING"

            if [[ "$RUNNING" -eq "$DESIRED" && "$PENDING" -eq 0 ]]; then
              echo "✓ ECS deployment completed"
              break
            fi

            if [[ $i -eq 60 ]]; then
              echo "✗ Deployment timeout (10 minutes)"
              exit 1
            fi

            sleep 10
          done
        timeout-minutes: 15

  # ────────────────────────────────────────────────────────────────────────
  # Dashboard deployment (S3 + CloudFront)
  # ────────────────────────────────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [deploy-application, determine-environment]
    if: needs.deploy-application.result == 'success'
    environment:
      name: "deploy-dashboard-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @workspace/dashboard build
        timeout-minutes: 15

      - name: Deploy to S3 and invalidate CloudFront
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          STACK_PREFIX="godsview-$GV_ENV"

          # Get S3 bucket name
          DASHBOARD_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_PREFIX-storage" \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardBucketName'].OutputValue" \
            --output text)

          if [[ -z "$DASHBOARD_BUCKET" || "$DASHBOARD_BUCKET" == "None" ]]; then
            echo "ERROR: Could not find dashboard bucket"
            exit 1
          fi

          echo "Uploading dashboard to S3: $DASHBOARD_BUCKET"

          # Sync non-HTML files with cache
          aws s3 sync artifacts/godsview-dashboard/dist/ \
            s3://$DASHBOARD_BUCKET/ \
            --delete \
            --cache-control "max-age=86400" \
            --exclude "*.html" \
            --exclude ".git*" \
            --exclude "node_modules"

          # Sync HTML files without cache
          aws s3 sync artifacts/godsview-dashboard/dist/ \
            s3://$DASHBOARD_BUCKET/ \
            --include "*.html" \
            --exclude "*" \
            --cache-control "no-cache, must-revalidate" \
            --metadata-directive REPLACE

          # Get CloudFront distribution ID and invalidate
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_PREFIX-compute" \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardDistributionId'].OutputValue" \
            --output text)

          if [[ -n "$CLOUDFRONT_ID" && "$CLOUDFRONT_ID" != "None" ]]; then
            echo "Invalidating CloudFront: $CLOUDFRONT_ID"
            aws cloudfront create-invalidation \
              --distribution-id $CLOUDFRONT_ID \
              --paths "/*" \
              --query 'Invalidation.Id' \
              --output text
          fi
        timeout-minutes: 10

  # ────────────────────────────────────────────────────────────────────────
  # Post-deployment health checks
  # ────────────────────────────────────────────────────────────────────────
  health-check:
    name: Post-Deployment Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-application, deploy-dashboard, determine-environment]
    if: always() && needs.deploy-application.result == 'success'
    environment:
      name: "health-check-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API endpoint
        id: get-endpoint
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          STACK_PREFIX="godsview-$GV_ENV"

          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_PREFIX-compute" \
            --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" \
            --output text)

          if [[ -z "$ALB_DNS" || "$ALB_DNS" == "None" ]]; then
            echo "WARNING: Could not find ALB DNS"
            echo "api_url=http://localhost" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "api_url=http://$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Health check - API /healthz
        continue-on-error: true
        run: |
          API_URL="${{ steps.get-endpoint.outputs.api_url }}"

          echo "Checking API health: $API_URL/api/healthz"
          curl -v "$API_URL/api/healthz" || echo "Health check failed"

      - name: Health check - API /readyz
        continue-on-error: true
        run: |
          API_URL="${{ steps.get-endpoint.outputs.api_url }}"

          echo "Checking API readiness: $API_URL/api/readyz"
          curl -v "$API_URL/api/readyz" || echo "Readiness check failed"

      - name: Health check - ECS service status
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          CLUSTER="godsview-$GV_ENV"
          SERVICE="ApiService"

          echo "ECS Service Status:"
          aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region $AWS_REGION \
            --query 'services[0].{Status:status, DesiredCount:desiredCount, RunningCount:runningCount, PendingCount:pendingCount}' \
            --output table

          # Check for deployment failures
          EVENTS=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region $AWS_REGION \
            --query 'services[0].events[0:3]')

          echo ""
          echo "Recent events:"
          echo "$EVENTS" | jq '.'

      - name: Health check - CloudWatch logs
        continue-on-error: true
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          LOG_GROUP="/ecs/godsview-$GV_ENV/api"

          echo "Recent logs from $LOG_GROUP (last 20 lines):"
          aws logs tail "$LOG_GROUP" \
            --max-items 20 \
            --follow \
            --region $AWS_REGION \
            --since 5m || echo "Could not retrieve logs"

  # ────────────────────────────────────────────────────────────────────────
  # Rollback on failure
  # ────────────────────────────────────────────────────────────────────────
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [health-check, deploy-application, determine-environment]
    if: |
      failure() &&
      needs.health-check.result == 'failure'
    environment:
      name: "rollback-${{ needs.determine-environment.outputs.environment }}"
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-rollback
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger rollback
        env:
          GV_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          CLUSTER="godsview-$GV_ENV"
          SERVICE="ApiService"

          echo "HEALTH CHECKS FAILED - INITIATING ROLLBACK"
          echo ""
          echo "Getting previous task definition..."

          # Get current service
          CURRENT_TASK=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region $AWS_REGION \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "Current task: $CURRENT_TASK"

          # Get task family
          FAMILY=$(echo "$CURRENT_TASK" | sed 's/:.*//; s/.*\///')

          # List previous revisions
          PREVIOUS_TASK=$(aws ecs list-task-definitions \
            --family-prefix "$FAMILY" \
            --region $AWS_REGION \
            --query 'taskDefinitionArns[-2]' \
            --output text)

          if [[ -z "$PREVIOUS_TASK" || "$PREVIOUS_TASK" == "None" ]]; then
            echo "ERROR: No previous task definition found"
            exit 1
          fi

          echo "Rolling back to: $PREVIOUS_TASK"

          # Update service
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition "$PREVIOUS_TASK" \
            --force-new-deployment \
            --region $AWS_REGION

          echo "Rollback initiated. Waiting for stability..."

          for i in {1..30}; do
            STATUS=$(aws ecs describe-services \
              --cluster $CLUSTER \
              --services $SERVICE \
              --region $AWS_REGION \
              --query 'services[0].{DesiredCount:desiredCount, RunningCount:runningCount}' \
              --output json)

            DESIRED=$(echo "$STATUS" | jq -r '.DesiredCount')
            RUNNING=$(echo "$STATUS" | jq -r '.RunningCount')

            echo "Rollback status: Desired=$DESIRED, Running=$RUNNING"

            if [[ "$RUNNING" -eq "$DESIRED" ]]; then
              echo "✓ Rollback completed"
              exit 0
            fi

            sleep 10
          done

          echo "Rollback completed but stability check timed out (may still be OK)"
        timeout-minutes: 10

  # ────────────────────────────────────────────────────────────────────────
  # Notification
  # ────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-infrastructure, deploy-application, health-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"

          if [[ "${{ needs.health-check.result }}" == "success" ]]; then
            STATUS="SUCCESS ✓"
            EMOJI="✓"
          else
            STATUS="FAILED ✗"
            EMOJI="✗"
          fi

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: ${{ needs.deploy-infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Application: ${{ needs.deploy-application.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Health Checks: ${{ needs.health-check.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Post deployment notification
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deployment failed. Check workflow logs for details.'
            })
