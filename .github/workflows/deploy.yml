name: GodsView CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO: godsview-prod-api

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build API server
        run: cd artifacts/api-server && pnpm run build
      - name: Build Dashboard
        run: cd artifacts/godsview-dashboard && pnpm run build

  docker:
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster godsview-prod \
            --service godsview-prod-api \
            --force-new-deployment \
            --region $AWS_REGION
      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster godsview-prod \
            --services godsview-prod-api \
            --region $AWS_REGION
        timeout-minutes: 10
      - name: Verify deployment health
        run: |
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name godsview-prod-compute \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDns`].OutputValue' \
            --output text)
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Health check passed"; exit 0; fi
            echo "Attempt $i: HTTP $STATUS — retrying..."; sleep 10
          done
          echo "Health check failed"; exit 1

  deploy-ec2:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/Godsview && git pull origin main && docker compose build api && docker compose up -d api nginx && curl -sf http://localhost/healthz || exit 1"]' \
            --region $AWS_REGION \
            --output text
      - name: Verify EC2 health
        run: |
          EC2_IP="${{ secrets.EC2_PUBLIC_IP }}"
          for i in $(seq 1 5); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$EC2_IP/healthz" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then echo "EC2 health check passed"; exit 0; fi
            echo "Attempt $i: HTTP $STATUS — retrying..."; sleep 15
          done
          echo "EC2 health check failed"; exit 1

  deploy-dashboard:
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dashboard
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}
        run: cd artifacts/godsview-dashboard && pnpm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        run: |
          aws s3 sync artifacts/godsview-dashboard/dist/ \
            s3://godsview-prod-dashboard-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --delete --cache-control "public, max-age=31536000, immutable"
          aws s3 cp artifacts/godsview-dashboard/dist/index.html \
            s3://godsview-prod-dashboard-${{ secrets.AWS_ACCOUNT_ID }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
      - name: Invalidate CloudFront
        run: |
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name godsview-prod-compute \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardDistId`].OutputValue' \
            --output text 2>/dev/null || echo "")
          if [ -n "$CF_DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$CF_DIST_ID" --paths "/*"
          fi
