# ─────────────────────────────────────────────────────────────────
# GodsView — Nginx Reverse Proxy
#
# Serves:
#   /api/*      → upstream API server (port 3001)
#   /healthz    → API health probe (pass-through)
#   /readyz     → API readiness probe (pass-through)
#   /metrics    → Prometheus metrics (pass-through)
#   /ws         → WebSocket upgrade for SSE/live signals
#   /*          → Dashboard static files (SPA fallback)
# ─────────────────────────────────────────────────────────────────

upstream api_backend {
    server api:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    # Redirect HTTP to HTTPS when SSL is available
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen 80 default_server;
    server_name _;

    # TLS configuration
    ssl_certificate /etc/nginx/ssl/godsview.crt;
    ssl_certificate_key /etc/nginx/ssl/godsview.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ── Health / metrics pass-through ────────────────────────────
    location ~ ^/(healthz|readyz|metrics|degradation|db-health)$ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # ── WebSocket / SSE for live signals ─────────────────────────
    location /ws {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── SSE stream endpoint ──────────────────────────────────────
    location /api/signals/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── Dashboard static files (SPA) ────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
