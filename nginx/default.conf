# ─────────────────────────────────────────────────────────────────
# GodsView — Nginx Reverse Proxy
#
# Serves:
#   /api/*      → upstream API server (port 3001)
#   /healthz    → API health probe (pass-through)
#   /readyz     → API readiness probe (pass-through)
#   /metrics    → Prometheus metrics (pass-through)
#   /ws         → WebSocket upgrade for SSE/live signals
#   /*          → Dashboard static files (SPA fallback)
# ─────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;

    # Use Docker's embedded DNS for dynamic resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── Non-/api/ backend routes (brain, backtest, signals, etc.) ─
    location ~ ^/(brain|backtest|signals|trades|performance|system|streaming|research|alpaca|orderbook|strict-setup|v2)(/|$) {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── Health / metrics pass-through ────────────────────────────
    location ~ ^/(healthz|readyz|metrics|degradation|db-health)$ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # ── WebSocket / SSE for live signals ─────────────────────────
    location /ws {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── SSE stream endpoint ──────────────────────────────────────
    location /api/signals/stream {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── Signal Engine: route /order-flow to Node API (alias) ────
    # Exact-match block takes priority over the prefix below so that
    # /api/signal-engine/order-flow lands on our Node alias (which
    # synthesizes a real order-flow snapshot from microstructure)
    # instead of the Python signal-engine on :8099 that doesn't
    # implement /order-flow.
    location = /api/signal-engine/order-flow {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # ── Signal Engine (paper trading) ──────────────────────────
    location /api/signal-engine/ {
        proxy_pass http://host.docker.internal:8099/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # ── Dashboard static files (SPA) ────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
