groups:
  - name: godsview_trading
    interval: 15s
    rules:
      - alert: KillSwitchActive
        expr: godsview_kill_switch == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "GodsView kill switch is ACTIVE"
          description: "Trading has been halted. All new orders are blocked."
      - alert: BreakerHalt
        expr: godsview_breaker_level == 3
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Drawdown breaker HALT — emergency liquidation triggered"
      - alert: BreakerWarning
        expr: godsview_breaker_level >= 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Drawdown breaker at level {{ $value }}"
      - alert: DailyLossExceeded
        expr: godsview_breaker_realized_pnl_usd < -200
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Daily realized loss exceeds $200"
      - alert: ConsecutiveLossStreak
        expr: godsview_breaker_consecutive_losses >= 3
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} consecutive losing trades"
      - alert: UnmatchedFills
        expr: godsview_unmatched_fills_total > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} unmatched fills — position tracking drift"
      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(godsview_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 API latency above 5 seconds"
      - alert: InstanceDown
        expr: up{job="godsview-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GodsView API instance is down"
