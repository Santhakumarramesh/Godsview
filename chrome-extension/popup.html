<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GodsView Bridge</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #0c0d10;
        color: #e6e6e6;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 12px;
        width: 320px;
      }
      header {
        padding: 12px 12px 8px;
        border-bottom: 1px solid #2a2c33;
      }
      header h1 {
        margin: 0;
        font-size: 13px;
        color: #9cff93;
        letter-spacing: 0.05em;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
      }
      .row label {
        color: #888;
      }
      .row strong {
        color: #67e8f9;
      }
      .stack {
        padding: 8px 12px;
        border-bottom: 1px solid #2a2c33;
      }
      .stack input,
      .stack textarea {
        width: 100%;
        box-sizing: border-box;
        background: #1a1b1f;
        border: 1px solid #2a2c33;
        color: #e6e6e6;
        padding: 6px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
      }
      .stack textarea {
        min-height: 64px;
      }
      .stack label {
        display: block;
        color: #888;
        margin: 6px 0 4px;
      }
      .actions {
        display: flex;
        gap: 6px;
        padding: 10px 12px;
      }
      .actions button {
        flex: 1;
        background: #9cff93;
        color: #0c0d10;
        border: 0;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
      }
      .actions button.secondary {
        background: #1a1b1f;
        color: #e6e6e6;
        border: 1px solid #2a2c33;
      }
      .out {
        padding: 8px 12px;
        font-size: 11px;
        color: #aaa;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ok   { color: #9cff93; }
      .warn { color: #fbbf24; }
      .err  { color: #ff7162; }
    </style>
  </head>
  <body>
    <header>
      <h1>GODSVIEW BRIDGE</h1>
    </header>
    <div class="row"><label>server</label><strong id="server">—</strong></div>
    <div class="row"><label>status</label><strong id="status">—</strong></div>
    <div class="row"><label>last ping</label><strong id="last-ping">—</strong></div>

    <div class="stack">
      <label for="server-url">Server URL</label>
      <input id="server-url" type="url" placeholder="http://127.0.0.1:5001" />
      <label for="passphrase">Webhook passphrase (optional)</label>
      <input id="passphrase" type="password" />
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <button id="ping" class="secondary">Test connection</button>
    </div>

    <div class="out" id="last-signal">last signal: —</div>
    <div class="out" id="last-decision">last decision: —</div>

    <script src="popup.js"></script>
  </body>
</html>
