# ─────────────────────────────────────────────────────────────────
# GodsView — Production Docker Compose Stack
#
# Services:
#   postgres       — PostgreSQL 16 with persistent volume
#   redis          — Shared cache / message bus
#   api            — GodsView API server (Express 5 + esbuild bundle)
#   nginx          — Reverse proxy serving dashboard + API
#   py-gateway     — Python v2 API Gateway (FastAPI)
#   py-market-data — Market data service
#   py-feature     — Feature computation service
#   py-backtest    — Backtesting engine
#   py-ml          — ML model training & prediction
#   py-execution   — Trade execution service
#   py-risk        — Risk calculations
#   py-memory      — Vector store / retrieval (LanceDB)
#   py-scheduler   — Task scheduling
#   mlflow         — ML experiment tracking
#
# Usage:
#   docker compose up -d              # start all
#   docker compose up -d api nginx    # Node.js only (no Python stack)
#   docker compose logs -f api        # tail API logs
#   docker compose down -v            # stop + remove volumes
#
# Profiles:
#   default        — postgres + api + nginx (Node.js only)
#   --profile v2   — adds all Python microservices + Redis + MLflow
# ─────────────────────────────────────────────────────────────────

# ── Python service defaults (shared anchor) ──────────────────────
x-py-defaults: &py-defaults
  build:
    context: .
    dockerfile: services/Dockerfile
  networks:
    - godsview-net
  env_file:
    - .env
  restart: unless-stopped
  profiles:
    - v2
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: godsview
      POSTGRES_USER: godsview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godsview_secret}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godsview -d godsview"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - godsview-net

  # ── Redis (shared cache + session store) ────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godsview-net

  # ── API Server (Node.js) ───────────────────────────────────────
  api:
    image: ${GODSVIEW_IMAGE:-ghcr.io/santhakumarramesh/godsview:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-memory:/data/memory
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://godsview:${POSTGRES_PASSWORD:-godsview_secret}@postgres:5432/godsview
      REDIS_URL: "redis://redis:6379"
      MEMORY_STORE_PATH: "/data/memory"
      DB_POOL_MAX: "${DB_POOL_MAX:-10}"
      # Trading keys (inject via .env file)
      ALPACA_API_KEY: "${ALPACA_API_KEY:-}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY:-}"
      ALPACA_BASE_URL: "${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_VETO_MODEL: "${CLAUDE_VETO_MODEL:-claude-sonnet-4-5-20241022}"
      CLAUDE_TIMEOUT_MS: "${CLAUDE_TIMEOUT_MS:-30000}"
      CLAUDE_MAX_RETRIES: "${CLAUDE_MAX_RETRIES:-1}"
      # Safety controls
      GODSVIEW_ENABLE_LIVE_TRADING: "${GODSVIEW_ENABLE_LIVE_TRADING:-false}"
      GODSVIEW_SYSTEM_MODE: "${GODSVIEW_SYSTEM_MODE:-paper}"
      GODSVIEW_KILL_SWITCH: "${GODSVIEW_KILL_SWITCH:-false}"
      GODSVIEW_MAX_DAILY_LOSS_USD: "${GODSVIEW_MAX_DAILY_LOSS_USD:-250}"
      GODSVIEW_MAX_OPEN_EXPOSURE_PCT: "${GODSVIEW_MAX_OPEN_EXPOSURE_PCT:-0.6}"
      GODSVIEW_MAX_TRADES_PER_SESSION: "${GODSVIEW_MAX_TRADES_PER_SESSION:-10}"
      GODSVIEW_COOLDOWN_AFTER_LOSSES: "${GODSVIEW_COOLDOWN_AFTER_LOSSES:-3}"
      GODSVIEW_COOLDOWN_MINUTES: "${GODSVIEW_COOLDOWN_MINUTES:-30}"
      GODSVIEW_BLOCK_ON_DEGRADED_DATA: "${GODSVIEW_BLOCK_ON_DEGRADED_DATA:-true}"
      GODSVIEW_OPERATOR_TOKEN: "${GODSVIEW_OPERATOR_TOKEN:-change-me}"
      GODSVIEW_DATA_PERSISTENCE: "${GODSVIEW_DATA_PERSISTENCE:-database}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost}"
      ECON_CALENDAR_URL: "${ECON_CALENDAR_URL:-https://nfs.faireconomy.media/ff_calendar_thisweek.json}"
      # Alt-Data & Market Intelligence
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      ALPHA_VANTAGE_API_KEY: "${ALPHA_VANTAGE_API_KEY:-}"
      TIINGO_API_KEY: "${TIINGO_API_KEY:-}"
      FRED_API_KEY: "${FRED_API_KEY:-}"
      BRAIN_WEBHOOK_SECRET: "${BRAIN_WEBHOOK_SECRET:-}"
      # AWS S3 Storage
      S3_ENDPOINT: "${S3_ENDPOINT:-https://s3.us-east-1.amazonaws.com}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_BUCKET: "${S3_BUCKET:-godsview-storage}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      # Service & Platform API Keys
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"
      GODSVIEW_API_KEY: "${GODSVIEW_API_KEY:-}"
      # Python v2 bridge (set to enable proxy to Python services)
      PY_GATEWAY_URL: "${PY_GATEWAY_URL:-http://py-gateway:8000}"
      PY_SERVICES_ENABLED: "${PY_SERVICES_ENABLED:-false}"
    expose:
      - "3001"
    networks:
      - godsview-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./artifacts/godsview-dashboard/dist/public:/usr/share/nginx/html:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - godsview-net

  # ════════════════════════════════════════════════════════════════
  # Python v2 Microservices (enabled with: docker compose --profile v2 up)
  # ════════════════════════════════════════════════════════════════

  py-gateway:
    <<: *py-defaults
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    depends_on:
      - py-market-data
      - py-feature
      - py-backtest
      - py-ml
      - py-execution
      - py-risk
      - py-memory
    environment:
      API_GATEWAY_PORT: "8000"
      MARKET_DATA_URL: "http://py-market-data:8001"
      FEATURE_URL: "http://py-feature:8002"
      BACKTEST_URL: "http://py-backtest:8003"
      ML_URL: "http://py-ml:8004"
      EXECUTION_URL: "http://py-execution:8005"
      RISK_URL: "http://py-risk:8006"
      MEMORY_URL: "http://py-memory:8007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-market-data:
    <<: *py-defaults
    command: uvicorn services.market_data_service.main:app --host 0.0.0.0 --port 8001 --workers 2
    expose:
      - "8001"
    volumes:
      - py-market-data:/app/data
    environment:
      MARKET_DATA_PORT: "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-feature:
    <<: *py-defaults
    command: uvicorn services.feature_service.main:app --host 0.0.0.0 --port 8002 --workers 2
    expose:
      - "8002"
    depends_on:
      - py-market-data
    environment:
      FEATURE_PORT: "8002"
      MARKET_DATA_URL: "http://py-market-data:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-backtest:
    <<: *py-defaults
    command: uvicorn services.backtest_service.main:app --host 0.0.0.0 --port 8003
    expose:
      - "8003"
    depends_on:
      - py-market-data
    environment:
      BACKTEST_PORT: "8003"
      MARKET_DATA_URL: "http://py-market-data:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 30s
      retries: 3

  py-ml:
    <<: *py-defaults
    command: uvicorn services.ml_service.main:app --host 0.0.0.0 --port 8004
    expose:
      - "8004"
    depends_on:
      - py-market-data
      - mlflow
    volumes:
      - py-models:/app/data/models
    environment:
      ML_PORT: "8004"
      MARKET_DATA_URL: "http://py-market-data:8001"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-execution:
    <<: *py-defaults
    command: uvicorn services.execution_service.main:app --host 0.0.0.0 --port 8005
    expose:
      - "8005"
    environment:
      EXECUTION_PORT: "8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-risk:
    <<: *py-defaults
    command: uvicorn services.risk_service.main:app --host 0.0.0.0 --port 8006
    expose:
      - "8006"
    environment:
      RISK_PORT: "8006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-memory:
    <<: *py-defaults
    command: uvicorn services.memory_service.main:app --host 0.0.0.0 --port 8007
    expose:
      - "8007"
    volumes:
      - py-lancedb:/app/data/lancedb
    environment:
      MEMORY_PORT: "8007"
      LANCEDB_URI: "/app/data/lancedb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  py-scheduler:
    <<: *py-defaults
    command: uvicorn services.scheduler_service.main:app --host 0.0.0.0 --port 8008
    expose:
      - "8008"
    depends_on:
      - py-gateway
      - py-market-data
      - py-feature
      - py-ml
    environment:
      SCHEDULER_PORT: "8008"
      SCAN_INTERVAL_SECONDS: "300"
      RETRAIN_HOUR_UTC: "21"
      API_GATEWAY_PORT: "8000"
      MARKET_DATA_PORT: "8001"
      FEATURE_PORT: "8002"
      ML_PORT: "8004"
      EXECUTION_PORT: "8005"
      RISK_PORT: "8006"
      MEMORY_PORT: "8007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MLflow Tracking Server ─────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    profiles:
      - v2
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    expose:
      - "5000"
    volumes:
      - py-mlflow:/mlflow
    restart: unless-stopped
    networks:
      - godsview-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
    driver: local
  api-memory:
    driver: local
  py-market-data:
    driver: local
  py-models:
    driver: local
  py-lancedb:
    driver: local
  py-mlflow:
    driver: local

networks:
  godsview-net:
    driver: bridge
