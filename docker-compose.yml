version: "3.9"

services:
  # ── PostgreSQL (Neon-compatible) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godsview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godsview_dev}
      POSTGRES_DB: ${POSTGRES_DB:-godsview}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godsview"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-godsview}:${POSTGRES_PASSWORD:-godsview_dev}@postgres:5432/${POSTGRES_DB:-godsview}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard (Vite + Nginx) ───────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: artifacts/godsview-dashboard/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
